<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Oleksandr Kolodii - architect-from-shadow</title>
  <desc id="desc">A portfolio banner with a dark architectural grid, warm highlights, and the words clarity, structure, execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090D14"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#1B1712"/>
    </linearGradient>
    <linearGradient id="accent" x1="172" y1="88" x2="1012" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#66E3FF"/>
      <stop offset="0.5" stop-color="#E7EEF8"/>
      <stop offset="1" stop-color="#F5B86B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(952 116) rotate(137.2) scale(353 234)">
      <stop stop-color="#F5B86B" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F5B86B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glow)"/>

  <path d="M780 64L1088 64L1088 356L780 356L780 64Z" stroke="url(#accent)" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M824 108H1044V312H824V108Z" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M868 152H1000V268H868V152Z" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="2"/>
  <path d="M780 356L868 268M1088 64L1000 152M780 64L868 152M1088 356L1000 268" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="72" y="72" width="656" height="276" rx="24" fill="#0D131E" fill-opacity="0.62" stroke="#FFFFFF" stroke-opacity="0.09"/>
  </g>

  <text x="112" y="132" fill="#9FEAFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="700" letter-spacing="3">
    ARCHITECT-FROM-SHADOW
  </text>
  <text x="112" y="202" fill="#F7FAFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800">
    Oleksandr Kolodii
  </text>
  <text x="114" y="250" fill="#C7D2E2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">
    shaping rough ideas into clear, usable systems
  </text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">
    <rect x="112" y="288" width="104" height="38" rx="19" fill="#172333" stroke="#9FEAFF" stroke-opacity="0.28"/>
    <text x="138" y="313" fill="#DFF8FF">clarity</text>
    <rect x="232" y="288" width="122" height="38" rx="19" fill="#172333" stroke="#E7EEF8" stroke-opacity="0.2"/>
    <text x="257" y="313" fill="#EEF4FF">structure</text>
    <rect x="370" y="288" width="124" height="38" rx="19" fill="#2A2119" stroke="#F5B86B" stroke-opacity="0.3"/>
    <text x="394" y="313" fill="#FFE0B4">execution</text>
  </g>

  <circle cx="1093" cy="75" r="5" fill="#9FEAFF"/>
  <circle cx="1069" cy="75" r="5" fill="#F5B86B"/>
  <circle cx="1045" cy="75" r="5" fill="#F7FAFF" fill-opacity="0.75"/>
</svg>
